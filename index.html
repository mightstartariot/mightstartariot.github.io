<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mightstartariot | Personal Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #79c0ff;
            --glass: rgba(13, 17, 23, 0.8);
            --border: rgba(240, 246, 252, 0.1);
            --text: #f0f6fc;
            --text-dim: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d1117;
            /* 初始背景图 */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            transition: background-image 0.5s ease;
        }

        .glass-card {
            width: 90%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            transition: 0.5s;
        }
        .avatar:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        .bio { font-size: 0.95rem; color: var(--text-dim); height: 1.5rem; margin-bottom: 30px; }

        /* 统计数据 */
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: #0d1117; }
        .btn-outline { border: 1px solid var(--border); color: var(--text); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* 悬浮音乐播放器 */
        .music-player {
            position: fixed;
            bottom: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .music-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .music-info {
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.3s;
            pointer-events: none;
        }
        .music-player:hover .music-info { opacity: 1; transform: translateX(0); }
        
        @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
        .playing { animation: spin 4s linear infinite; color: #50fa7b; }

        /* 背景切换按钮 */
        .bg-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="https://github.com/mightstartariot.png" alt="Avatar" class="avatar">
    <h1>Mightstartariot</h1>
    <p class="bio" id="typing"></p>

    <div class="stats">
        <div class="stat-item">
            <span class="stat-val" id="repos">--</span>
            <span class="stat-label">Repos</span>
        </div>
        <div class="stat-item">
            <span class="stat-val" id="followers">--</span>
            <span class="stat-label">Followers</span>
        </div>
        <div class="stat-item">
            <span class="stat-val">Online</span>
            <span class="stat-label">Status</span>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://github.com/mightstartariot" class="btn btn-primary" target="_blank">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="mailto:your-email@example.com?subject=Hello&body=来自网页的问候" class="btn btn-outline">
            <i class="fas fa-envelope"></i> 联系我
        </a>
    </div>
</div>

<div class="music-player">
    <button class="music-btn" onclick="toggleMusic()">
        <i class="fas fa-music" id="music-icon"></i>
    </button>
    <div class="music-info">Lofi Coding Mix</div>
    <audio id="bg-audio" loop>
        <source src=music.mp3 type="audio/mpeg">
    </audio>
</div>

<button class="bg-btn" onclick="nextBg()">🎨</button>

<script>
    // 1. 打字机
    const txt = "探索代码的边界，构建有趣的灵魂。";
    let i = 0;
    function typeEffect() {
        if (i < txt.length) {
            document.getElementById("typing").innerHTML += txt.charAt(i);
            i++;
            setTimeout(typeEffect, 100);
        }
    }
    typeEffect();

    // 2. 实时数据
    async function getStats() {
        try {
            const res = await fetch('https://api.github.com/users/mightstartariot');
            const data = await res.json();
            document.getElementById('repos').innerText = data.public_repos;
            document.getElementById('followers').innerText = data.followers;
        } catch(e) { console.log("API Error"); }
    }
    getStats();

    // 3. 音乐控制
    const audio = document.getElementById('bg-audio');
    const icon = document.getElementById('music-icon');
    function toggleMusic() {
        if (audio.paused) { audio.play(); icon.classList.add('playing'); }
        else { audio.pause(); icon.classList.remove('playing'); }
    }

    // 4. 背景切换
    const bgs = [
        'https://images.unsplash.com/photo-1451187580459-43490279c0fa',
        'https://www.douyin.com/search/%E8%BF%88%E5%85%8B%E5%B0%94%E5%9B%9E%E6%9D%A5%E5%90%A7%E7%BB%8F%E5%85%B8%E7%94%BB%E9%9D%A2',
        'https://images.unsplash.com/photo-1550745165-9bc0b252726f',
        'https://images.unsplash.com/photo-1504639725590-34d0984388bd'
    ];
    let bgIdx = 0;
    function nextBg() {
        bgIdx = (bgIdx + 1) % bgs.length;
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${bgs[bgIdx]}?auto=format&fit=crop&w=1920&q=80')`;
    }
</script>

</body>
</html>
