<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mightstartariot | Personal Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #79c0ff;
            --bg: #0d1117;
            --glass: rgba(22, 27, 34, 0.8);
            --border: rgba(48, 54, 61, 0.8);
        }

        * { margin: 0; padding: 0; box-box: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #c9d1d9;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- 动态星空背景 --- */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        /* --- 容器 --- */
        .container {
            max-width: 900px;
            width: 95%;
            padding: 50px 20px;
        }

        /* --- 个人卡片 (毛玻璃) --- */
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 5px;
            transition: transform 0.5s;
        }
        .avatar:hover { transform: rotate(360deg); }

        h1 { font-size: 2.5em; color: white; margin: 15px 0; }

        /* 打字机动画 */
        .typing {
            font-family: monospace;
            border-right: 2px solid var(--primary);
            white-space: nowrap;
            overflow: hidden;
            margin: 0 auto;
            animation: typing 3.5s steps(30, end), blink-caret .75s step-end infinite;
        }

        /* --- 实时数据看板 --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat-num { display: block; font-size: 1.5em; color: var(--primary); font-weight: bold; }
        .stat-label { font-size: 0.8em; color: #8b949e; }

        /* --- 按钮 --- */
        .btn-group { display: flex; justify-content: center; gap: 15px; }
        .btn {
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            background: #238636;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover { background: #2ea043; transform: scale(1.05); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--border); }

        /* 动画定义 */
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--primary) } }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .typing { font-size: 0.9em; white-space: normal; border: none; animation: none; }
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="container">
    <div class="profile-card">
        <img src="https://github.com/mightstartariot.png" alt="Avatar" class="avatar">
        <h1>Mightstartariot</h1>
        <div style="display: inline-block;">
            <p class="typing">Hello, I'm a developer exploring the future.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-num" id="repo-count">...</span>
                <span class="stat-label">Repositories</span>
            </div>
            <div class="stat-item">
                <span class="stat-num" id="follower-count">...</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">2026</span>
                <span class="stat-label">Year</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://github.com/mightstartariot" class="btn" target="_blank">
                <i class="fab fa-github"></i> Follow Me
            </a>
            <a href="mailto:your-email@example.com" class="btn btn-outline">
                <i class="fas fa-envelope"></i> Contact
            </a>
        </div>
    </div>

    </div>

<script>
    // --- 核心小功能：调用 GitHub API 实时获取数据 ---
    async function getGitHubStats() {
        const username = 'mightstartariot';
        try {
            const response = await fetch(`https://api.github.com/users/${username}`);
            const data = await response.json();
            
            document.getElementById('repo-count').innerText = data.public_repos || '0';
            document.getElementById('follower-count').innerText = data.followers || '0';
        } catch (error) {
            console.error('获取数据失败:', error);
            document.getElementById('repo-count').innerText = 'Err';
            document.getElementById('follower-count').innerText = 'Err';
        }
    }

    getGitHubStats();
</script>

</body>
</html>
